version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.4
    container_name: monitoreo_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-monitoreo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-monitoreo123}
      - POSTGRES_DB=${POSTGRES_DB:-monitoreodb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"

  api:
    build: ./backend
    container_name: monitoreo_api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-monitoreo}:${POSTGRES_PASSWORD:-monitoreo123}@db:5432/${POSTGRES_DB:-monitoreodb}
      - CORS_ORIGINS=*
    depends_on:
      - db
    expose:
      - "8000"

  tileserver:
    image: maptiler/tileserver-gl:latest
    container_name: monitoreo_tileserver
    restart: unless-stopped
    volumes:
      - ./maps:/data
    expose:
      - "8080"
    command: [ "-p", "8080", "--mbtiles", "colombia.mbtiles" ]

  web:
    build:
      context: ./frontend
      args:
        - PUBLIC_API_URL=/api/v1
    container_name: monitoreo_web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
      - tileserver

volumes:
  postgres_data:
