services:
  # 🗄️ Database (PostGIS)
  db:
    image: postgis/postgis:15-3.4
    container_name: monitoreo_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-monitoreo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-monitoreo123}
      - POSTGRES_DB=${POSTGRES_DB:-monitoreodb}
    volumes:
      - /var/lib/monitoreo/db:/var/lib/postgresql/data
    networks:
      - monitoreo_net

  # 🌐 API Backend
  api:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: monitoreo_api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-monitoreo}:${POSTGRES_PASSWORD:-monitoreo123}@db:5432/${POSTGRES_DB:-monitoreodb}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    depends_on:
      - db
    volumes:
      - /var/lib/monitoreo/maps:/app/maps
    networks:
      - monitoreo_net

  # 💻 Web Frontend
  web:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
      args:
        - PUBLIC_API_URL=${PUBLIC_API_URL:-https://api2.neuraljira.tech}
        - PUBLIC_MAP_TILE_URL=${PUBLIC_MAP_TILE_URL:-/tiles/}
    container_name: monitoreo_web
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - monitoreo_net

  # 🗺️ Map Server (TileServer GL)
  tileserver:
    build:
      context: ./maps
      dockerfile: Dockerfile
    container_name: monitoreo_mapserver
    restart: unless-stopped
    volumes:
      - /var/lib/monitoreo/maps:/data
    command: [ "-p", "8080", "-c", "/data/tileserver-config.json" ]
    networks:
      - monitoreo_net

networks:
  monitoreo_net:
    driver: bridge
