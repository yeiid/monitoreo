services:
  # 🌐 API Backend
  api:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: monitoreo_api
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    volumes:
      - /var/www/maps:/app/maps

  # 💻 Web Frontend
  web:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
      args:
        - PUBLIC_API_URL=${PUBLIC_API_URL}
    container_name: monitoreo_web
    restart: unless-stopped
    expose:
      - "80"

  # 🗺️ TileServer GL
  tileserver:
    image: maptiler/tileserver-gl:latest
    container_name: monitoreo_tileserver
    restart: unless-stopped
    volumes:
      - /var/www/maps:/data
    expose:
      - "8080"
    command: [ "-p", "8080", "--mbtiles", "colombia.mbtiles" ]
