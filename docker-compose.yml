services:
  # 🗄️ Database (PostGIS)
  db:
    image: postgis/postgis:15-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-monitoreo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monitoreo123}
      POSTGRES_DB: ${POSTGRES_DB:-monitoreodb}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monitoreo} -d ${POSTGRES_DB:-monitoreodb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 🌐 API Backend (FastAPI)
  api:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-monitoreo}:${POSTGRES_PASSWORD:-monitoreo123}@db:5432/${POSTGRES_DB:-monitoreodb}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://neuraljira.tech}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  # 🗺️ Map Server (TileServer GL)
  tileserver:
    build:
      context: ./maps
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - map_data:/data
    networks:
      - internal

  # 💻 Web Frontend (Astro + Nginx Reverse Proxy)
  web:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
      args:
        PUBLIC_API_URL: /api/v1
        PUBLIC_MAP_TILE_URL: /styles/basic/style.json
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
      - tileserver
    networks:
      - internal

volumes:
  db_data:
  map_data:

networks:
  internal:
    driver: bridge
