services:
  # 🗄️ Database (Local PostGIS)
  db:
    image: postgis/postgis:15-3.4
    container_name: monitoreo_db_local
    restart: unless-stopped
    environment:
      - POSTGRES_USER=monitoreo
      - POSTGRES_PASSWORD=monitoreo123
      - POSTGRES_DB=monitoreodb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_local:/var/lib/postgresql/data

  # 🌐 API Backend
  api:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: monitoreo_api_local
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://monitoreo:monitoreo123@db:5432/monitoreodb
      - CORS_ORIGINS=*
    depends_on:
      - db
    volumes:
      - ./maps:/app/maps

  # 💻 Web Frontend
  web:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
      args:
        - PUBLIC_API_URL=http://localhost:8000
    container_name: monitoreo_web_local
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

  # 🗺️ TileServer GL (Servicio Desacoplado)
  tileserver:
    build:
      context: ./maps
      dockerfile: Dockerfile
    container_name: monitoreo_tileserver_local
    restart: unless-stopped
    volumes:
      - ./maps:/data
    ports:
      - "8080:8080"
    command: [ "-p", "8080", "-c", "/data/tileserver-config.json" ]

volumes:
  postgres_data_local:
