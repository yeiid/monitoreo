server {
    listen 80;
    server_name _;
    absolute_redirect off;

    # MIME Types and Default Type
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # Proxy to Backend API
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Proxy to TileServer GL (Priority over generic static files)
    location ^~ /data/ {
        proxy_pass http://tileserver:8080/data/;
        proxy_set_header Host $host;
    }
    location ^~ /styles/ {
        proxy_pass http://tileserver:8080/styles/;
        proxy_set_header Host $host;
    }
    location ^~ /fonts/ {
        proxy_pass http://tileserver:8080/fonts/;
        proxy_set_header Host $host;
    }
    location ^~ /sprites/ {
        proxy_pass http://tileserver:8080/sprites/;
        proxy_set_header Host $host;
    }

    # Cache control for Astro static assets
    location ^~ /_astro/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # General Static frontend files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ $uri.html /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
