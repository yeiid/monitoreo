services:
  web:
    build:
      context: ..
      dockerfile: ./frontend/Dockerfile
      args:
        - PUBLIC_API_URL=${PUBLIC_API_URL:-/api/v1}
        - PUBLIC_MAP_TILE_URL=${PUBLIC_MAP_TILE_URL:-/tiles/}
    container_name: monitoreo_web_standalone
    restart: unless-stopped
    ports:
      - "3000:80"
