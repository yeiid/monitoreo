services:
  # 🗄️ Database (PostGIS)
  db:
    image: postgis/postgis:15-3.4
    container_name: monitoreo_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-monitoreo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-monitoreo123}
      - POSTGRES_DB=${POSTGRES_DB:-monitoreodb}
    volumes:
      - /var/lib/monitoreo/db:/var/lib/postgresql/data
    expose:
      - "5432"

  # 🌐 API Backend
  api:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: monitoreo_api
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-monitoreo}:${POSTGRES_PASSWORD:-monitoreo123}@db:5432/${POSTGRES_DB:-monitoreodb}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    depends_on:
      - db
    volumes:
      - /var/lib/monitoreo/maps:/app/maps

  # 💻 Web Frontend
  web:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
      args:
        - PUBLIC_API_URL=${PUBLIC_API_URL}
        - PUBLIC_MAP_TILE_URL=${PUBLIC_MAP_TILE_URL}
    container_name: monitoreo_web
    restart: unless-stopped
    expose:
      - "80"

  # 🗺️ TileServer GL
  tileserver:
    image: maptiler/tileserver-gl:latest
    container_name: monitoreo_tileserver
    restart: unless-stopped
    volumes:
      - /var/lib/monitoreo/maps:/data
    expose:
      - "8080"
    command: [ "-p", "8080", "-c", "/data/tileserver-config.json" ]
